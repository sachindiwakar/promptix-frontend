<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Larger neural nodes -->
  <circle cx="14" cy="14" r="4" fill="#5044E5"/>
  <circle cx="50" cy="14" r="4" fill="#5044E5"/>
  <circle cx="14" cy="50" r="4" fill="#5044E5"/>
  <circle cx="50" cy="50" r="4" fill="#5044E5"/>

  <!-- Thicker connections -->
  <line x1="32" y1="32" x2="14" y2="14" stroke="#5044E5" stroke-width="3"/>
  <line x1="32" y1="32" x2="50" y2="14" stroke="#5044E5" stroke-width="3"/>
  <line x1="32" y1="32" x2="14" y2="50" stroke="#5044E5" stroke-width="3"/>
  <line x1="32" y1="32" x2="50" y2="50" stroke="#5044E5" stroke-width="3"/>

  <!-- Bigger center circle -->
  <circle cx="32" cy="32" r="16" fill="#5044E5"/>

  <!-- Large bold P -->
  <text x="32" y="40" text-anchor="middle" font-size="26" fill="white" font-family="Arial, sans-serif" font-weight="900">
    P
